networks:
  minecraft-network:
    driver: bridge
services:
  tunnel:
#    container_name: minecraft-tunnel
    image: cloudflare/cloudflared
    command: tunnel run
    environment:
     - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
  playit:
    image: ghcr.io/playit-cloud/playit-agent:latest
#    network_mode: host
    environment:
    - SECRET_KEY=${PLAYITGG_SECRET_KEY}
    networks:
      - game-network
  watchtower:
    container_name: watchtower
    image: nickfedor/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  crafty:
#    container_name: crafty
    image: registry.gitlab.com/crafty-controller/crafty-4:latest
    restart: always
    environment:
      - TZ=Etc/UTC
    networks:
      - game-network
    ports:
#      - "5520-5550:5520-5550/udp" # Hytale
      - "8000:8000" # HTTP
      - "8443:8443" # HTTPS
#      - "8123:8123" # DYNMAP
#      - "19132:19132/udp" # BEDROCK
      - "25500-25600:25500-25600" # MC SERV PORT RANGE
    volumes:
      - /data/minecraft/backups:/crafty/backups
      - /data/minecraft/logs:/crafty/logs
      - /data/minecraft/servers:/crafty/servers
      - /data/minecraft/config:/crafty/app/config
      - /data/minecraft/import:/crafty/import
